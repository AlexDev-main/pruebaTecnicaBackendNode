services:
  app:
    build:
      context: .
    container_name: inventory-api
    depends_on:
      - mongo
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - MONGO_URI=mongodb://mongo:27017/inventory?replicaSet=rs0&directConnection=true
      - JWT_SECRET=${JWT_SECRET:-change_me}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@inventory.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-Admin123*}
    command: npm run dev
    volumes:
      - .:/app
      - /app/node_modules

  mongo:
    image: mongo:8
    container_name: mongo
    hostname: mongo
    command:
      - mongod
      - --replSet
      - rs0
      - --bind_ip_all
    ports:
      - "27017:27017"
    volumes:
      - ./docker/mongo/init-replica.js:/docker-entrypoint-initdb.d/init-replica.js:ro
      - mongo_data:/data/db

volumes:
  mongo_data: